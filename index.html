<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Space Map: Anomalies & Voids</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffaa;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        #gameCanvas:active {
            cursor: grabbing;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(2, 2, 7, 0.95);
            padding: 15px;
            border: 1px solid #00ffaa;
            border-radius: 6px;
            pointer-events: none;
            line-height: 1.4;
            max-width: 320px;
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.15);
        }
        .heading {
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px solid #00ffaa;
            padding-bottom: 4px;
            text-transform: uppercase;
        }
        .text-cyan { color: #00ffff; }
        #locatorPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(2, 2, 7, 0.95);
            padding: 15px;
            border: 1px solid #00ffff;
            border-radius: 6px;
            width: 260px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
        }
        .locator-btn {
            display: block;
            width: 100%;
            background: rgba(0, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid #00ffff;
            padding: 6px 10px;
            margin: 6px 0;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            font-size: 11px;
            transition: all 0.2s ease;
        }
        .locator-btn:hover {
            background: rgba(0, 255, 255, 0.25);
            color: #00ffff;
            padding-left: 14px;
        }
        #zoomOutBtn {
            background: rgba(255, 0, 255, 0.08);
            border-color: #ff00ff;
            color: #ff00ff;
            font-weight: bold;
            text-align: center;
        }
        #zoomOutBtn:hover {
            background: rgba(255, 0, 255, 0.25);
            color: #ffffff;
            padding-left: 10px;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="heading">🛰️ Deep Space Array</div>
        <div id="coords">Sector: X=0, Y=0</div>
        <div id="zoom">Magnification: 1.00x</div>
        <div style="margin-top: 10px; font-size: 11px; color: #88aaaa;">
            • Drag map to pan view<br>
            • Mouse wheel to zoom<br>
            • Click Tracking Array to jump
        </div>
    </div>

    <div id="locatorPanel">
        <div class="heading text-cyan">📡 Tracking Matrix</div>
        <button class="locator-btn" onclick="focusTarget('Sun')">☀️ Solar Core</button>
        <button class="locator-btn" onclick="focusTarget('Earth')">🌍 Inner Planets System</button>
        <button class="locator-btn" onclick="focusTarget('Jupiter')">🪐 Outer Gas Giants</button>
        <button class="locator-btn" onclick="focusTarget('PSR B1919+21')">⚡ Rapid Spinning Pulsar</button>
        <button class="locator-btn" onclick="focusTarget('Gargantua')">🕳️ Accretion Black Hole</button>
        <button class="locator-btn" onclick="focusTarget('Orion Nebula')">🌌 Orion Stardust Nebula</button>
        <button class="locator-btn" onclick="focusTarget('Bootes Void')">👁️ The Böotes Void Anomaly</button>
        <button class="locator-btn" id="zoomOutBtn" onclick="zoomMaxOut()">🔍 Full Galaxy Zoom Out</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let cameraX = 0;
        let cameraY = 0;
        let zoom = 0.5;
        let targetCameraX = 0;
        let targetCameraY = 0;
        let targetZoom = 0.5;
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let timeGlobal = 0;

        const starsLayer1 = []; 
        const starsLayer2 = []; 
        const starsLayer3 = []; 
        const skyNebulae = [];

        function generateDeepSky() {
            // High Density Star Array Population
            for (let i = 0; i < 900; i++) {
                starsLayer1.push({ x: (Math.random() - 0.5) * 24000, y: (Math.random() - 0.5) * 24000, r: Math.random() * 0.7 + 0.3 });
            }
            for (let i = 0; i < 500; i++) {
                starsLayer2.push({ x: (Math.random() - 0.5) * 24000, y: (Math.random() - 0.5) * 24000, r: Math.random() * 1.3 + 0.7 });
            }
            for (let i = 0; i < 200; i++) {
                starsLayer3.push({ 
                    x: (Math.random() - 0.5) * 24000, 
                    y: (Math.random() - 0.5) * 24000, 
                    r: Math.random() * 2.2 + 1.5,
                    phase: Math.random() * Math.PI 
                });
            }
            // Dense Cosmic Gas Clouds
            const cloudColors = [
                'rgba(140, 0, 200, 0.04)', 'rgba(0, 70, 220, 0.04)', 
                'rgba(0, 160, 120, 0.03)', 'rgba(200, 0, 70, 0.03)',
                'rgba(255, 120, 0, 0.02)'
            ];
            for (let i = 0; i < 65; i++) {
                skyNebulae.push({
                    x: (Math.random() - 0.5) * 20000,
                    y: (Math.random() - 0.5) * 20000,
                    r: Math.random() * 1200 + 500,
                    color: cloudColors[Math.floor(Math.random() * cloudColors.length)]
                });
            }
        }
        generateDeepSky();
        const bodies = [
            // Core System (Expanded Orbit Radius Values to Prevent Overlapping)
            { id: "Sun", name: "Sun", radius: 65, isCustom: true, orbitRadius: 0, speed: 0, angle: 0, 
              draw: (x, y, r) => {
                  let grad = ctx.createRadialGradient(x, y, 0, x, y, r * 2.2);
                  grad.addColorStop(0, '#ffffff');
                  grad.addColorStop(0.2, '#ffea00');
                  grad.addColorStop(0.6, '#ff5500');
                  grad.addColorStop(1, 'rgba(255,85,0,0)');
                  ctx.fillStyle = grad;
                  ctx.beginPath(); ctx.arc(x, y, r * 2.2, 0, Math.PI*2); ctx.fill();
              }
            },
            { id: "Mercury", name: "Mercury", radius: 8, color: "#95989a", orbitRadius: 250, speed: 0.015, angle: 0.5, features: 'craters' },
            { id: "Venus", name: "Venus", radius: 14, color: "#e6a163", orbitRadius: 380, speed: 0.011, angle: 2.1, features: 'atmosphere' },
            { id: "Earth", name: "Earth", radius: 16, color: "#3289d6", orbitRadius: 520, speed: 0.008, angle: 4.3, features: 'continents' },
            { id: "Mars", name: "Mars", radius: 12, color: "#d14b15", orbitRadius: 660, speed: 0.006, angle: 1.2, features: 'icecaps' },
            { id: "Jupiter", name: "Jupiter", radius: 34, color: "#d8a06d", orbitRadius: 900, speed: 0.003, angle: 5.6, features: 'atmosphere' },
            { id: "Saturn", name: "Saturn", radius: 28, color: "#e2bf7d", orbitRadius: 1200, speed: 0.002, angle: 3.1, features: 'rings' },
            
            // Ultra-Fast Pulsar System
            { id: "PSR B1919+21", name: "PSR B1919+21 (Pulsar)", radius: 10, fixedX: 4500, fixedY: -3500, isCustom: true,
              draw: (x, y, r) => {
                  let spin = timeGlobal * 0.9;
                  ctx.save(); ctx.translate(x, y); ctx.rotate(spin);
                  for (let angleOffset of [0, Math.PI]) {
                      ctx.save(); ctx.rotate(angleOffset);
                      let jetGrad = ctx.createLinearGradient(0, 0, 0, -3000 * zoom);
                      jetGrad.addColorStop(0, 'rgba(255,255,255,1)');
                      jetGrad.addColorStop(0.15, 'rgba(0,210,255,0.5)');
                      jetGrad.addColorStop(0.5, 'rgba(180,0,255,0.12)');
                      jetGrad.addColorStop(1, 'rgba(0,0,0,0)');
                      ctx.fillStyle = jetGrad;
                      ctx.beginPath();
                      ctx.moveTo(-6 * zoom, 0); ctx.lineTo(6 * zoom, 0);
                      ctx.lineTo(150 * zoom, -3000 * zoom); ctx.lineTo(-150 * zoom, -3000 * zoom);
                      ctx.closePath(); ctx.fill();
                  }
                  ctx.restore();
                  let coreGrad = ctx.createRadialGradient(x, y, 0, x, y, r * 2);
                  coreGrad.addColorStop(0, '#ffffff'); coreGrad.addColorStop(0.2, '#00ffff'); coreGrad.addColorStop(1, 'rgba(0,128,255,0)');
                  ctx.fillStyle = coreGrad; ctx.beginPath(); ctx.arc(x, y, r * 2, 0, Math.PI*2); ctx.fill();
              }
            },

            // Massive Interstellar Accretion Black Hole
            { id: "Gargantua", name: "Gargantua (Black Hole)", radius: 30, fixedX: -5500, fixedY: 5000, isCustom: true,
              draw: (x, y, r) => {
                  ctx.save(); ctx.translate(x, y); ctx.rotate(timeGlobal * 0.025);
                  let diskGrad = ctx.createRadialGradient(0, 0, r * 1.1, 0, 0, r * 6);
                  diskGrad.addColorStop(0, '#ff9900'); diskGrad.addColorStop(0.3, '#ff3300');
                  diskGrad.addColorStop(0.7, 'rgba(80,0,220,0.15)'); diskGrad.addColorStop(1, 'rgba(0,0,0,0)');
                  ctx.strokeStyle = diskGrad; ctx.lineWidth = r * 2.2;
                  ctx.beginPath(); ctx.ellipse(0, 0, r * 5, r * 1.8, Math.PI / 6, 0, Math.PI * 2); ctx.stroke();
                  ctx.restore();
                  ctx.fillStyle = '#000000'; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
              }
            },

            // Giant Stellar Nebula Dust Pockets
            { id: "Orion Nebula", name: "Orion Nebula (Stellar Nursery)", radius: 320, fixedX: 2000, fixedY: 7000, isCustom: true,
              draw: (x, y, r) => {
                  let nebGrad = ctx.createRadialGradient(x, y, r * 0.05, x, y, r);
                  nebGrad.addColorStop(0, 'rgba(255, 0, 128, 0.45)');
                  nebGrad.addColorStop(0.4, 'rgba(0, 128, 255, 0.3)');
                  nebGrad.addColorStop(0.7, 'rgba(0, 255, 150, 0.1)');
                  nebGrad.addColorStop(1, 'rgba(0,0,0,0)');
                  ctx.fillStyle = nebGrad; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                  ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(x, y, 3 * zoom, 0, Math.PI * 2); ctx.fill();
              }
            },

            // The Bootes Void (Eerie Empty Vacuum Zone that swallows star background elements)
            { id: "Bootes Void", name: "The Böotes Void (The Great Nothing)", radius: 450, fixedX: -6500, fixedY: -6500, isCustom: true,
              draw: (x, y, r) => {
                  // Draw a dark mask area that creates a distinct circle of empty darkness
                  let voidGrad = ctx.createRadialGradient(x, y, r * 0.4, x, y, r);
                  voidGrad.addColorStop(0, '#010103');
                  voidGrad.addColorStop(0.7, 'rgba(2,2,7,0.8)');
                  voidGrad.addColorStop(1, 'rgba(2,2,7,0)');
                  ctx.fillStyle = voidGrad;
                  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();

                  // Faint red structural monitoring boundary outline ring
                  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
                  ctx.strokeStyle = 'rgba(255, 0, 50, 0.15)';
                  ctx.lineWidth = Math.max(1, 2 * zoom);
                  ctx.setLineDash([6 * zoom, 12 * zoom]);
                  ctx.stroke();
                  ctx.setLineDash([]); // Reset dash array style
              }
            }
        ];
        function focusTarget(id) {
            let target = bodies.find(b => b.id === id);
            if (!target) return;
            if (target.orbitRadius > 0) {
                targetCameraX = target.orbitRadius * Math.cos(target.angle);
                targetCameraY = target.orbitRadius * Math.sin(target.angle);
                targetZoom = 1.1;
            } else if (target.orbitRadius === 0) {
                targetCameraX = 0; targetCameraY = 0; targetZoom = 0.8;
            } else {
                targetCameraX = target.fixedX;
                targetCameraY = target.fixedY;
                if (target.id === "Bootes Void") targetZoom = 0.18;
                else if (target.id === "Orion Nebula") targetZoom = 0.22;
                else targetZoom = 1.1;
            }
        }

        function zoomMaxOut() {
            targetCameraX = 0;
            targetCameraY = 0;
            targetZoom = 0.04; // Micro Map Macro View Field Layout
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('#locatorPanel') || e.target.closest('#hud')) return;
            isDragging = true;
            lastMouseX = e.clientX; lastMouseY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - lastMouseX;
            const deltaY = e.clientY - lastMouseY;
            cameraX -= deltaX / zoom;
            cameraY -= deltaY / zoom;
            targetCameraX = cameraX; targetCameraY = cameraY;
            lastMouseX = e.clientX; lastMouseY = e.clientY;
        });

        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mouseleave', () => isDragging = false);

        window.addEventListener('wheel', (e) => {
            if (e.deltaY < 0) targetZoom *= 1.3;
            else targetZoom /= 1.3;
            targetZoom = Math.max(0.02, Math.min(targetZoom, 5.0));
        });

        function gameLoop() {
            timeGlobal += 1;
            cameraX += (targetCameraX - cameraX) * 0.08;
            cameraY += (targetCameraY - cameraY) * 0.08;
            zoom += (targetZoom - zoom) * 0.08;
            updatePhysics();
            render();
            updateHUD();
            requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            bodies.forEach(body => {
                if (body.orbitRadius > 0) body.angle += body.speed;
            });
        }

        function render() {
            ctx.fillStyle = '#010103'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2; const centerY = canvas.height / 2;

            // Render Gas Clouds
            skyNebulae.forEach(neb => {
                const screenX = (neb.x - cameraX) * zoom + centerX;
                const screenY = (neb.y - cameraY) * zoom + centerY;
                const scrRadius = neb.r * zoom;
                if (screenX + scrRadius > 0 && screenX - scrRadius < canvas.width && screenY + scrRadius > 0 && screenY - scrRadius < canvas.height) {
                    let cloudGrad = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, scrRadius);
                    cloudGrad.addColorStop(0, neb.color); cloudGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = cloudGrad; ctx.beginPath(); ctx.arc(screenX, screenY, scrRadius, 0, Math.PI * 2); ctx.fill();
                }
            });

            // Mask out stars falling directly inside the massive Bootes Void location
            let bVoid = bodies.find(b => b.id === "Bootes Void");
            const vX = bVoid.fixedX; const vY = bVoid.fixedY; const vR = bVoid.radius;

            const checkInVoid = (sx, sy) => {
                let dx = sx - vX; let dy = sy - vY;
                return Math.sqrt(dx*dx + dy*dy) < vR * 0.85;
            };

            // Render Stars Layer 1
            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            starsLayer1.forEach(st => {
                if (checkInVoid(st.x, st.y)) return;
                const scrX = (st.x - cameraX) * zoom + centerX;
                const scrY = (st.y - cameraY) * zoom + centerY;
                if (scrX >= 0 && scrX <= canvas.width && scrY >= 0 && scrY <= canvas.height) ctx.fillRect(scrX, scrY, st.r, st.r);
            });

            // Render Stars Layer 2
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            starsLayer2.forEach(st => {
                if (checkInVoid(st.x, st.y)) return;
                const scrX = (st.x - cameraX) * zoom + centerX;
                const scrY = (st.y - cameraY) * zoom + centerY;
                if (scrX >= 0 && scrX <= canvas.width && scrY >= 0 && scrY <= canvas.height) {
                    ctx.beginPath(); ctx.arc(scrX, scrY, st.r * Math.max(0.4, zoom), 0, Math.PI * 2); ctx.fill();
                }
            });

            // Render Stars Layer 3
            starsLayer3.forEach(st => {
                if (checkInVoid(st.x, st.y)) return;
                const scrX = (st.x - cameraX) * zoom + centerX;
                const scrY = (st.y - cameraY) * zoom + centerY;
                if (scrX >= 0 && scrX <= canvas.width && scrY >= 0 && scrY <= canvas.height) {
                    let twist = Math.sin(timeGlobal * 0.05 + st.phase) * 0.5 + 0.5;
                    ctx.fillStyle = `rgba(195, 235, 255, ${0.25 + twist * 0.75})`;
                    ctx.beginPath(); ctx.arc(scrX, scrY, st.r * (0.5 + twist * 0.6) * Math.max(0.4, zoom), 0, Math.PI * 2); ctx.fill();
                }
            });

            // Orbit Lines
            bodies.forEach(body => {
                if (body.orbitRadius > 0) {
                    const sunX = (0 - cameraX) * zoom + centerX; const sunY = (0 - cameraY) * zoom + centerY;
                    ctx.beginPath(); ctx.arc(sunX, sunY, body.orbitRadius * zoom, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(0, 255, 170, 0.05)'; ctx.lineWidth = 1; ctx.stroke();
                }
            });

            // Render Celestial Items
            bodies.forEach(body => {
                let worldX = body.orbitRadius > 0 ? body.orbitRadius * Math.cos(body.angle) : (body.orbitRadius === 0 ? 0 : body.fixedX);
                let worldY = body.orbitRadius > 0 ? body.orbitRadius * Math.sin(body.angle) : (body.orbitRadius === 0 ? 0 : body.fixedY);

                const screenX = (worldX - cameraX) * zoom + centerX;
                const screenY = (worldY - cameraY) * zoom + centerY;
                const scaledRadius = Math.max(2, body.radius * zoom);

                if (screenX < -400 || screenX > canvas.width + 400 || screenY < -400 || screenY > canvas.height + 400) return;

                if (body.isCustom) {
                    body.draw(screenX, screenY, scaledRadius);
                } else {
                    ctx.save(); ctx.translate(screenX, screenY);
                    
                    // Base Circle Planet Shape
                    ctx.beginPath(); ctx.arc(0, 0, scaledRadius, 0, Math.PI * 2);
                    ctx.fillStyle = body.color; ctx.fill();

                    if (body.features === 'craters') {
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                        ctx.beginPath(); ctx.arc(-scaledRadius*0.3, -scaledRadius*0.2, scaledRadius*0.25, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(scaledRadius*0.4, scaledRadius*0.3, scaledRadius*0.2, 0, Math.PI*2); ctx.fill();
                    } 
                    else if (body.features === 'atmosphere') {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.fillRect(-scaledRadius, -scaledRadius*0.4, scaledRadius*2, scaledRadius*0.2);
                        ctx.fillRect(-scaledRadius, scaledRadius*0.3, scaledRadius*2, scaledRadius*0.15);
                    } 
                    else if (body.features === 'continents') {
                        ctx.fillStyle = '#1e7b1e'; ctx.beginPath();
                        ctx.ellipse(-scaledRadius*0.2, -scaledRadius*0.1, scaledRadius*0.5, scaledRadius*0.4, 0, 0, Math.PI*2);
                        ctx.ellipse(scaledRadius*0.3, scaledRadius*0.2, scaledRadius*0.4, Math.max(1, scaledRadius*0.4), Math.PI/4, 0, Math.PI*2);
                        ctx.fill();
                    } 
                    else if (body.features === 'icecaps') {
                        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(0, -scaledRadius*0.8, scaledRadius*0.35, 0, Math.PI, false); ctx.fill();
                    }
                    else if (body.features === 'rings') {
                        ctx.strokeStyle = 'rgba(210, 180, 140, 0.6)'; ctx.lineWidth = Math.max(1, 6 * zoom);
                        ctx.beginPath(); ctx.ellipse(0, 0, scaledRadius * 1.8, scaledRadius * 0.4, -Math.PI/8, 0, Math.PI * 2); ctx.stroke();
                    }

                    let shadowGrad = ctx.createLinearGradient(-scaledRadius, -scaledRadius, scaledRadius, scaledRadius);
                    shadowGrad.addColorStop(0, 'rgba(255,255,255,0.05)'); shadowGrad.addColorStop(1, 'rgba(0,0,0,0.85)');
                    ctx.fillStyle = shadowGrad; ctx.beginPath(); ctx.arc(0, 0, scaledRadius, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                }

                const fontHeight = Math.max(10, Math.floor(13 * zoom));
                ctx.font = `${fontHeight}px 'Courier New'`; ctx.fillStyle = '#ffffff';
                ctx.fillText(body.name, screenX + scaledRadius + 8, screenY + 4);
            });
        }

        function updateHUD() {
            document.getElementById('coords').innerText = `Sector: X=${Math.round(cameraX)}, Y=${Math.round(cameraY)}`;
            document.getElementById('zoom').innerText = `Magnification: ${zoom.toFixed(2)}x`;
        }

        gameLoop();
    </script>
</body>
</html>
