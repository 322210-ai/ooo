<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Map Array: Anomalies & Extremophiles</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffaa;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        #gameCanvas:active {
            cursor: grabbing;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(2, 2, 7, 0.95);
            padding: 15px;
            border: 1px solid #00ffaa;
            border-radius: 6px;
            pointer-events: none;
            line-height: 1.4;
            max-width: 320px;
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.15);
        }
        .heading {
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px solid #00ffaa;
            padding-bottom: 4px;
            text-transform: uppercase;
        }
        .text-cyan { color: #00ffff; }
        #locatorPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(2, 2, 7, 0.95);
            padding: 15px;
            border: 1px solid #00ffff;
            border-radius: 6px;
            width: 280px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
        }
        .locator-btn {
            display: block;
            width: 100%;
            background: rgba(0, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid #00ffff;
            padding: 6px 10px;
            margin: 5px 0;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            font-size: 11px;
            transition: all 0.2s ease;
        }
        .locator-btn:hover {
            background: rgba(0, 255, 255, 0.25);
            color: #00ffff;
            padding-left: 14px;
        }
        #zoomOutBtn {
            background: rgba(255, 0, 255, 0.08);
            border-color: #ff00ff;
            color: #ff00ff;
            font-weight: bold;
            text-align: center;
        }
        #zoomOutBtn:hover {
            background: rgba(255, 0, 255, 0.25);
            color: #ffffff;
            padding-left: 10px;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="heading">🛰️ Tracking Array</div>
        <div id="coords">Sector: X=0, Y=0</div>
        <div id="zoom">Magnification: 1.00x</div>
        <div style="margin-top: 10px; font-size: 11px; color: #88aaaa;">
            • Click and drag to pan space<br>
            • Use mouse wheel to zoom<br>
            • Click targets to track them
        </div>
    </div>

    <div id="locatorPanel">
        <div class="heading text-cyan">📡 System Matrix</div>
        <button class="locator-btn" onclick="focusTarget('Sun')">☀️ Solar Core</button>
        <button class="locator-btn" onclick="focusTarget('Earth')">🌍 Inner Planets System</button>
        <button class="locator-btn" onclick="focusTarget('TOI-178b')">🌀 TOI-178 Resonance Chain</button>
        <button class="locator-btn" onclick="focusTarget('Kelt-9b')">🔥 Kelt-9b (Ultra-Hot Saturn)</button>
        <button class="locator-btn" onclick="focusTarget('Wasp-76b')">🌧️ Wasp-76b (Iron Rain World)</button>
        <button class="locator-btn" onclick="focusTarget('GJ 1214b')">🌊 GJ 1214b (Steam Atmosphere)</button>
        <button class="locator-btn" onclick="focusTarget('Kepler-16b')">🪐 Kepler-16b (Circumbinary)</button>
        <button class="locator-btn" onclick="focusTarget('PSR B1919+21')">⚡ PSR B1919+21 (Safe Pulsar)</button>
        <button class="locator-btn" onclick="focusTarget('Gargantua')">🕳️ Gargantua Black Hole</button>
        <button class="locator-btn" onclick="focusTarget('TON 618')">😈 TON 618 (Hypermassive Hole)</button>
        <button class="locator-btn" onclick="focusTarget('Einstein Ring')">⭕ Einstein Gravitational Ring</button>
        <button class="locator-btn" onclick="focusTarget('Guardians')">💎 Guardians (Sizzling Seven)</button>
        <button class="locator-btn" onclick="focusTarget('Hoags Object')">🌌 Hoag's Ring Galaxy</button>
        <button class="locator-btn" onclick="focusTarget('Bootes Void')">👁️ The Böotes Void Anomaly</button>
        <button class="locator-btn" id="zoomOutBtn" onclick="zoomMaxOut()">🔍 Macro Sector Zoom Out</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let cameraX = 0; let cameraY = 0; let zoom = 0.5;
        let targetCameraX = 0; let targetCameraY = 0; let targetZoom = 0.5;
        let isDragging = false; let lastMouseX = 0; let lastMouseY = 0; let timeGlobal = 0;

        const starsLayer1 = []; const starsLayer2 = []; const starsLayer3 = []; const skyNebulae = [];

        function generateDeepSky() {
            for (let i = 0; i < 900; i++) {
                starsLayer1.push({ x: (Math.random() - 0.5) * 24000, y: (Math.random() - 0.5) * 24000, r: Math.random() * 0.7 + 0.3 });
            }
            for (let i = 0; i < 500; i++) {
                starsLayer2.push({ x: (Math.random() - 0.5) * 24000, y: (Math.random() - 0.5) * 24000, r: Math.random() * 1.3 + 0.7 });
            }
            for (let i = 0; i < 200; i++) {
                starsLayer3.push({ x: (Math.random() - 0.5) * 24000, y: (Math.random() - 0.5) * 24000, r: Math.random() * 2.2 + 1.5, phase: Math.random() * Math.PI });
            }
            const cloudColors = ['rgba(140, 0, 200, 0.04)', 'rgba(0, 70, 220, 0.04)', 'rgba(0, 160, 120, 0.03)', 'rgba(200, 0, 70, 0.03)'];
            for (let i = 0; i < 65; i++) {
                skyNebulae.push({ x: (Math.random() - 0.5) * 20000, y: (Math.random() - 0.5) * 20000, r: Math.random() * 1200 + 500, color: cloudColors[Math.floor(Math.random() * cloudColors.length)] });
            }
        }
        generateDeepSky();
        const bodies = [
            { id: "Sun", name: "Sun", radius: 65, isCustom: true, orbitRadius: 0, speed: 0, angle: 0, 
              draw: (x, y, r) => {
                  let grad = ctx.createRadialGradient(x, y, 0, x, y, r * 2.2);
                  grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.2, '#ffea00'); grad.addColorStop(0.6, '#ff5500'); grad.addColorStop(1, 'rgba(255,85,0,0)');
                  ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, r * 2.2, 0, Math.PI*2); ctx.fill();
              }
            },
            { id: "Mercury", name: "Mercury", radius: 7, color: "#95989a", orbitRadius: 190, speed: 0.015, angle: 0.5, features: 'craters' },
            { id: "Venus", name: "Venus", radius: 13, color: "#e6a163", orbitRadius: 280, speed: 0.011, angle: 2.1, features: 'atmosphere' },
            { id: "Earth", name: "Earth", radius: 15, color: "#3289d6", orbitRadius: 380, speed: 0.008, angle: 4.3, features: 'continents' },
            { id: "Mars", name: "Mars", radius: 11, color: "#d14b15", orbitRadius: 470, speed: 0.006, angle: 1.2, features: 'icecaps' },
            
            { id: "TOI-178b", name: "TOI-178b (Resonant Inner)", radius: 10, color: "#8b9bb4", orbitRadius: 580, speed: 0.0075, angle: 0, features: 'craters' },
            { id: "TOI-178c", name: "TOI-178c (Resonant Mid)", radius: 12, color: "#cca3a3", orbitRadius: 680, speed: 0.0050, angle: Math.PI / 3, features: 'atmosphere' },
            { id: "TOI-178d", name: "TOI-178d (Resonant Outer)", radius: 14, color: "#a3c2c2", orbitRadius: 780, speed: 0.0033, angle: (2 * Math.PI) / 3, features: 'atmosphere' }
        ];
        bodies.push(
            { id: "Kelt-9b", name: "Kelt-9b (Ultra-Hot Saturn)", radius: 24, color: "#ff4500", orbitRadius: 950, speed: 0.0025, angle: 1.5, features: 'atmosphere' },
            { id: "Wasp-76b", name: "Wasp-76b (Iron Rain World)", radius: 26, color: "#4b0082", orbitRadius: 1150, speed: 0.0018, angle: 3.8, features: 'atmosphere' },
            { id: "GJ 1214b", name: "GJ 1214b (Water World)", radius: 19, color: "#00ffff", orbitRadius: 1350, speed: 0.0012, angle: 5.2, features: 'atmosphere' },
            { id: "Kepler-16b", name: "Kepler-16b (Tatooine Dual)", radius: 21, color: "#d2b48c", orbitRadius: 1600, speed: 0.0009, angle: 2.7, features: 'rings' },
            
            { id: "PSR B1919+21", name: "PSR B1919+21 (Pulsar)", radius: 8, fixedX: 4500, fixedY: -3500, isCustom: true,
              draw: (x, y, r) => {
                  let spin = timeGlobal * 0.12; 
                  ctx.save(); ctx.translate(x, y); ctx.rotate(spin);
                  for (let angleOffset of [0, Math.PI]) {
                      ctx.save(); ctx.rotate(angleOffset);
                      let jetGrad = ctx.createLinearGradient(0, 0, 0, -2000 * zoom);
                      jetGrad.addColorStop(0, 'rgba(255,255,255,1)'); jetGrad.addColorStop(0.3, 'rgba(0,180,255,0.25)'); jetGrad.addColorStop(1, 'rgba(0,0,0,0)');
                      ctx.fillStyle = jetGrad; ctx.beginPath(); ctx.moveTo(-4 * zoom, 0); ctx.lineTo(4 * zoom, 0);
                      ctx.lineTo(60 * zoom, -2000 * zoom); ctx.lineTo(-60 * zoom, -2000 * zoom);
                      ctx.closePath(); ctx.fill(); ctx.restore();
                  }
                  ctx.restore();
                  ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(x, y, r * 1.4, 0, Math.PI*2); ctx.fill();
              }
            }
        );
        bodies.push(
            { id: "Gargantua", name: "Gargantua (Black Hole)", radius: 28, fixedX: -5500, fixedY: 5000, isCustom: true,
              draw: (x, y, r) => {
                  ctx.save(); ctx.translate(x, y); ctx.rotate(timeGlobal * 0.015);
                  let diskGrad = ctx.createRadialGradient(0, 0, r * 1.1, 0, 0, r * 5);
                  diskGrad.addColorStop(0, '#ffaa00'); diskGrad.addColorStop(0.2, '#ff3300'); diskGrad.addColorStop(1, 'rgba(0,0,0,0)');
                  ctx.strokeStyle = diskGrad; ctx.lineWidth = r * 1.8;
                  ctx.beginPath(); ctx.ellipse(0, 0, r * 4.5, r * 1.5, Math.PI / 6, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
                  ctx.fillStyle = '#000000'; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
              }
            },
            { id: "TON 618", name: "TON 618 (Hypermassive Hole)", radius: 50, fixedX: 7500, fixedY: 7500, isCustom: true,
              draw: (x, y, r) => {
                  ctx.save(); ctx.translate(x, y); ctx.rotate(-timeGlobal * 0.008);
                  let diskGrad = ctx.createRadialGradient(0, 0, r * 1.1, 0, 0, r * 7);
                  diskGrad.addColorStop(0, '#ffffff'); diskGrad.addColorStop(0.3, '#ff00ff'); diskGrad.addColorStop(1, 'rgba(0,0,0,0)');
                  ctx.strokeStyle = diskGrad; ctx.lineWidth = r * 2.5;
                  ctx.beginPath(); ctx.ellipse(0, 0, r * 6, r * 2.5, -Math.PI / 4, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
                  ctx.fillStyle = '#000000'; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
              }
            },
            { id: "Einstein Ring", name: "Einstein Ring Horizon", radius: 40, fixedX: 6500, fixedY: -6500, isCustom: true,
              draw: (x, y, r) => {
                  ctx.beginPath(); ctx.arc(x, y, r * 1.6, 0, Math.PI * 2);
                  ctx.strokeStyle = 'rgba(255, 165, 0, 0.7)'; ctx.lineWidth = 4 * zoom; ctx.stroke();
                  ctx.fillStyle = '#000000'; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
              }
            },
            { id: "Guardians", name: "Guardians (Sizzling Seven Cluster)", radius: 80, fixedX: -2000, fixedY: -6500, isCustom: true,
              draw: (x, y, r) => {
                  let points = [[0,0], [-40,20], [30,-30], [-20,-40], [40,40], [-50,-10], [10,50]];
                  points.forEach((pt, idx) => {
                      let bx = x + pt[0] * zoom; let by = y + pt[1] * zoom;
                      let f = Math.sin(timeGlobal * 0.1 + idx) * 3 * zoom;
                      ctx.fillStyle = idx % 2 === 0 ? '#ff3366' : '#ffcc00';
                      ctx.beginPath(); ctx.arc(bx, by, (6 * zoom) + f, 0, Math.PI * 2); ctx.fill();
                  });
              }
            },
            { id: "Hoags Object", name: "Hoag's Object (Ring Galaxy)", radius: 120, fixedX: -7500, fixedY: -1500, isCustom: true,
              draw: (x, y, r) => {
                  ctx.fillStyle = '#ffea00'; ctx.beginPath(); ctx.arc(x, y, 14 * zoom, 0, Math.PI * 2); ctx.fill();
                  ctx.strokeStyle = 'rgba(100, 149, 237, 0.5)'; ctx.lineWidth = 25 * zoom;
                  ctx.beginPath(); ctx.arc(x, y, r * 0.8, 0, Math.PI * 2); ctx.stroke();
              }
            },
            { id: "Bootes Void", name: "The Böotes Void Anomaly", radius: 550, fixedX: -8500, fixedY: -7500, isCustom: true,
              draw: (x, y, r) => {
                  let voidGrad = ctx.createRadialGradient(x, y, r * 0.4, x, y, r);
                  voidGrad.addColorStop(0, '#010103'); voidGrad.addColorStop(1, 'rgba(2,2,7,0)');
                  ctx.fillStyle = voidGrad; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.strokeStyle = 'rgba(255, 0, 50, 0.12)';
                  ctx.lineWidth = 2 * zoom; ctx.stroke();
              }
            }
        );
        function focusTarget(id) {
            let target = bodies.find(b => b.id === id);
            if (!target) return;
            if (target.orbitRadius > 0) {
                targetCameraX = target.orbitRadius * Math.cos(target.angle);
                targetCameraY = target.orbitRadius * Math.sin(target.angle);
                targetZoom = 1.0;
            } else if (target.orbitRadius === 0) {
                targetCameraX = 0; targetCameraY = 0; targetZoom = 0.6;
            } else {
                targetCameraX = target.fixedX;
                targetCameraY = target.fixedY;
                if (target.id === "Bootes Void") targetZoom = 0.08;
                else if (target.id === "Hoags Object") targetZoom = 0.15;
                else targetZoom = 0.8;
            }
        }

        function zoomMaxOut() {
            targetCameraX = 0; targetCameraY = 0; targetZoom = 0.02; 
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('#locatorPanel') || e.target.closest('#hud')) return;
            isDragging = true; lastMouseX = e.clientX; lastMouseY = e.clientY;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - lastMouseX; const deltaY = e.clientY - lastMouseY;
            cameraX -= deltaX / zoom; cameraY -= deltaY / zoom;
            targetCameraX = cameraX; targetCameraY = cameraY;
            lastMouseX = e.clientX; lastMouseY = e.clientY;
        });

        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mouseleave', () => isDragging = false);

        window.addEventListener('wheel', (e) => {
            if (e.deltaY < 0) targetZoom *= 1.3;
            else targetZoom /= 1.3;
            targetZoom = Math.max(0.01, Math.min(targetZoom, 4.0));
        });

        function gameLoop() {
            timeGlobal += 1;
            cameraX += (targetCameraX - cameraX) * 0.08; cameraY += (targetCameraY - cameraY) * 0.08; zoom += (targetZoom - zoom) * 0.08;
            updatePhysics(); render(); updateHUD();
            requestAnimationFrame(gameLoop);
        }

        function updatePhysics() {
            bodies.forEach(body => { if (body.orbitRadius > 0) body.angle += body.speed; });
        }

        function render() {
            ctx.fillStyle = '#010103'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2; const centerY = canvas.height / 2;

            skyNebulae.forEach(neb => {
                const screenX = (neb.x - cameraX) * zoom + centerX; const screenY = (neb.y - cameraY) * zoom + centerY; const scrRadius = neb.r * zoom;
                if (screenX + scrRadius > 0 && screenX - scrRadius < canvas.width && screenY + scrRadius > 0 && screenY - scrRadius < canvas.height) {
                    let cloudGrad = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, scrRadius);
                    cloudGrad.addColorStop(0, neb.color); cloudGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = cloudGrad; ctx.beginPath(); ctx.arc(screenX, screenY, scrRadius, 0, Math.PI * 2); ctx.fill();
                }
            });

            let bVoid = bodies.find(b => b.id === "Bootes Void");
            const checkInVoid = (sx, sy) => {
                let dx = sx - bVoid.fixedX; let dy = sy - bVoid.fixedY;
                return Math.sqrt(dx*dx + dy*dy) < bVoid.radius * 0.85;
            };

            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            starsLayer1.forEach(st => {
                if (checkInVoid(st.x, st.y)) return;
                const scrX = (st.x - cameraX) * zoom + centerX; const scrY = (st.y - cameraY) * zoom + centerY;
                if (scrX >= 0 && scrX <= canvas.width && scrY >= 0 && scrY <= canvas.height) ctx.fillRect(scrX, scrY, st.r, st.r);
            });

            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            starsLayer2.forEach(st => {
                if (checkInVoid(st.x, st.y)) return;
                const scrX = (st.x - cameraX) * zoom + centerX; const scrY = (st.y - cameraY) * zoom + centerY;
                if (scrX >= 0 && scrX <= canvas.width && scrY >= 0 && scrY <= canvas.height) {
                    ctx.beginPath(); ctx.arc(scrX, scrY, st.r * Math.max(0.4, zoom), 0, Math.PI * 2); ctx.fill();
                }
            });

            starsLayer3.forEach(st => {
                if (checkInVoid(st.x, st.y)) return;
                const scrX = (st.x - cameraX) * zoom + centerX; const scrY = (st.y - cameraY) * zoom + centerY;
                if (scrX >= 0 && scrX <= canvas.width && scrY >= 0 && scrY <= canvas.height) {
                    let twist = Math.sin(timeGlobal * 0.05 + st.phase) * 0.5 + 0.5;
                    ctx.fillStyle = `rgba(195, 235, 255, ${0.25 + twist * 0.75})`;
                    ctx.beginPath(); ctx.arc(scrX, scrY, st.r * (0.5 + twist * 0.6) * Math.max(0.4, zoom), 0, Math.PI * 2); ctx.fill();
                }
            });

            bodies.forEach(body => {
                if (body.orbitRadius > 0) {
                    const sunX = (0 - cameraX) * zoom + centerX; const sunY = (0 - cameraY) * zoom + centerY;
                    ctx.beginPath(); ctx.arc(sunX, sunY, body.orbitRadius * zoom, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(0, 255, 170, 0.04)'; ctx.lineWidth = 1; ctx.stroke();
                }
            });

            bodies.forEach(body => {
                let worldX = body.orbitRadius > 0 ? body.orbitRadius * Math.cos(body.angle) : (body.orbitRadius === 0 ? 0 : body.fixedX);
                let worldY = body.orbitRadius > 0 ? body.orbitRadius * Math.sin(body.angle) : (body.orbitRadius === 0 ? 0 : body.fixedY);
                const screenX = (worldX - cameraX) * zoom + centerX; const screenY = (worldY - cameraY) * zoom + centerY; const scaledRadius = Math.max(2, body.radius * zoom);

                if (screenX < -1500 || screenX > canvas.width + 1500 || screenY < -1500 || screenY > canvas.height + 1500) return;

                if (body.isCustom) {
                    body.draw(screenX, screenY, scaledRadius);
                } else {
                    ctx.save(); ctx.translate(screenX, screenY);
                    ctx.beginPath(); ctx.arc(0, 0, scaledRadius, 0, Math.PI * 2); ctx.fillStyle = body.color; ctx.fill();

                    if (body.features === 'craters') {
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                        ctx.beginPath(); ctx.arc(-scaledRadius*0.3, -scaledRadius*0.2, scaledRadius*0.25, 0, Math.PI*2); ctx.fill();
                        ctx.beginPath(); ctx.arc(scaledRadius*0.4, scaledRadius*0.3, scaledRadius*0.2, 0, Math.PI*2); ctx.fill();
                    } 
                    else if (body.features === 'atmosphere') {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.fillRect(-scaledRadius, -scaledRadius*0.4, scaledRadius*2, scaledRadius*0.2);
                        ctx.fillRect(-scaledRadius, scaledRadius*0.3, scaledRadius*2, scaledRadius*0.15);
                    } 
                    else if (body.features === 'continents') {
                        ctx.fillStyle = '#1e7b1e'; ctx.beginPath();
                        ctx.ellipse(-scaledRadius*0.2, -scaledRadius*0.1, scaledRadius*0.5, scaledRadius*0.4, 0, 0, Math.PI*2);
                        ctx.ellipse(scaledRadius*0.3, scaledRadius*0.2, scaledRadius*0.4, Math.max(1, scaledRadius*0.4), Math.PI/4, 0, Math.PI*2);
                        ctx.fill();
                    } 
                    else if (body.features === 'icecaps') {
                        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(0, -scaledRadius*0.8, scaledRadius*0.35, 0, Math.PI, false); ctx.fill();
                    }
                    else if (body.features === 'rings') {
                        ctx.strokeStyle = 'rgba(210, 180, 140, 0.6)'; ctx.lineWidth = Math.max(1, 6 * zoom);
                        ctx.beginPath(); ctx.ellipse(0, 0, scaledRadius * 1.8, scaledRadius * 0.4, -Math.PI/8, 0, Math.PI * 2); ctx.stroke();
                    }

                    let shadowGrad = ctx.createLinearGradient(-scaledRadius, -scaledRadius, scaledRadius, scaledRadius);
                    shadowGrad.addColorStop(0, 'rgba(255,255,255,0.05)'); shadowGrad.addColorStop(1, 'rgba(0,0,0,0.85)');
                    ctx.fillStyle = shadowGrad; ctx.beginPath(); ctx.arc(0, 0, scaledRadius, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                }
                const fontHeight = Math.max(10, Math.floor(13 * zoom));
                ctx.font = `${fontHeight}px 'Courier New'`; ctx.fillStyle = '#ffffff';
                ctx.fillText(body.name, screenX + scaledRadius + 8, screenY + 4);
            });
        }

        function updateHUD() {
            document.getElementById('coords').innerText = `Sector: X=${Math.round(cameraX)}, Y=${Math.round(cameraY)}`;
            document.getElementById('zoom').innerText = `Magnification: ${zoom.toFixed(2)}x`;
        }

        gameLoop();
    </script>
</body>
</html>
