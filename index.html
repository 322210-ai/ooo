<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Cartography Array: Cosmological Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffaa;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        #gameCanvas:active {
            cursor: grabbing;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(2, 2, 7, 0.95);
            padding: 12px;
            border: 1px solid #00ffaa;
            border-radius: 6px;
            pointer-events: none;
            line-height: 1.4;
            max-width: 320px;
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.15);
            font-size: 11px;
        }
        .heading {
            font-weight: bold;
            margin-bottom: 6px;
            border-bottom: 1px solid #00ffaa;
            padding-bottom: 4px;
            text-transform: uppercase;
            font-size: 12px;
        }
        .text-cyan { color: #00ffff; }
        #locatorPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(2, 2, 7, 0.95);
            padding: 12px;
            border: 1px solid #00ffff;
            border-radius: 6px;
            width: 280px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.15);
        }
        .section-title {
            font-size: 10px;
            color: #88aaaa;
            margin-top: 8px;
            margin-bottom: 2px;
            text-transform: uppercase;
            border-bottom: 1px dashed rgba(0, 255, 255, 0.3);
        }
        .locator-btn {
            display: block;
            width: 100%;
            background: rgba(0, 255, 255, 0.08);
            color: #ffffff;
            border: 1px solid #00ffff;
            padding: 5px 8px;
            margin: 4px 0;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            font-size: 11px;
            transition: all 0.2s ease;
        }
        .locator-btn:hover {
            background: rgba(0, 255, 255, 0.25);
            color: #00ffff;
            padding-left: 12px;
        }
        #zoomOutBtn {
            background: rgba(255, 0, 255, 0.08);
            border-color: #ff00ff;
            color: #ff00ff;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
        }
        #zoomOutBtn:hover {
            background: rgba(255, 0, 255, 0.25);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="heading">🛰️ Telemetry Core</div>
        <div id="coords">Sector: X=0, Y=0</div>
        <div id="zoom">Magnification: 1.00x</div>
        <div style="margin-top: 6px; font-size: 10px; color: #88aaaa;">
            • Click and drag to pan view<br>
            • Use mouse wheel to zoom<br>
            • Use Tracking Array to jump
        </div>
    </div>
    <div id="locatorPanel">
        <div class="heading text-cyan">📡 Tracking Matrix</div>
        
        <div class="section-title">Sol System Core</div>
        <button class="locator-btn" onclick="focusTarget('Sun')">☀️ Solar Core</button>
        <button class="locator-btn" onclick="focusTarget('Earth')">🌍 Inner Planets Chain</button>
        
        <div class="section-title">Exotic Worlds</div>
        <button class="locator-btn" onclick="focusTarget('KELT-9b')">🔥 KELT-9b (Ultra-Hot)</button>
        <button class="locator-btn" onclick="focusTarget('WASP-76b')">🌧️ WASP-76b (Iron Rain)</button>
        <button class="locator-btn" onclick="focusTarget('GJ 1214b')">🌊 GJ 1214b (Water World)</button>
        <button class="locator-btn" onclick="focusTarget('Kepler-16b')">🪐 Kepler-16b (Tatooine)</button>
        <button class="locator-btn" onclick="focusTarget('TOI-178')">🎼 TOI-178 Star System</button>
        
        <div class="section-title">Exotic Cosmic Anomalies</div>
        <button class="locator-btn" onclick="focusTarget('PSR B1919+21')">⚡ PSR B1919+21 (Pulsar)</button>
        <button class="locator-btn" onclick="focusTarget('Sizzling Seven')">✨ The Guardians (Septet)</button>
        <button class="locator-btn" onclick="focusTarget('Gargantua')">🕳️ Gargantua Black Hole</button>
        <button class="locator-btn" onclick="focusTarget('Cygnus X-1')">🌀 Cygnus X-1 Microquasar</button>
        <button class="locator-btn" onclick="focusTarget('Einstein Ring')">⭕ Lensed Einstein Ring</button>
        
        <div class="section-title">Deep Macroscopic Structures</div>
        <button class="locator-btn" onclick="focusTarget('Bootes Void')">👁️ The Böotes Void Void</button>
        <button class="locator-btn" onclick="focusTarget("Hoag's Object")">🎡 Hoag's Object Ring</button>
        
        <button class="locator-btn" id="zoomOutBtn" onclick="zoomMaxOut()">🔍 Full Cartography View</button>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let cameraX = 0;
        let cameraY = 0;
        let zoom = 0.5;
        let targetCameraX = 0;
        let targetCameraY = 0;
        let targetZoom = 0.5;
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let timeGlobal = 0;

        const starsLayer1 = []; 
        const starsLayer2 = []; 
        const starsLayer3 = []; 
        const skyNebulae = [];

        function generateDeepSky() {
            for (let i = 0; i < 800; i++) {
                starsLayer1.push({ x: (Math.random() - 0.5) * 30000, y: (Math.random() - 0.5) * 30000, r: Math.random() * 0.7 + 0.3 });
            }
            for (let i = 0; i < 400; i++) {
                starsLayer2.push({ x: (Math.random() - 0.5) * 30000, y: (Math.random() - 0.5) * 30000, r: Math.random() * 1.3 + 0.6 });
            }
            for (let i = 0; i < 150; i++) {
                starsLayer3.push({ 
                    x: (Math.random() - 0.5) * 30000, 
                    y: (Math.random() - 0.5) * 30000, 
                    r: Math.random() * 2.0 + 1.2,
                    phase: Math.random() * Math.PI 
                });
            }
            const cloudColors = [
                'rgba(140, 0, 200, 0.03)', 'rgba(0, 70, 220, 0.03)', 
                'rgba(0, 160, 120, 0.02)', 'rgba(200, 0, 70, 0.02)',
                'rgba(255, 100, 0, 0.02)', 'rgba(0, 200, 255, 0.02)'
            ];
            for (let i = 0; i < 80; i++) {
                skyNebulae.push({
                    x: (Math.random() - 0.5) * 26000,
                    y: (Math.random() - 0.5) * 26000,
                    r: Math.random() * 1400 + 600,
                    color: cloudColors[Math.floor(Math.random() * cloudColors.length)]
                });
            }
        }
        generateDeepSky();
        const bodies = [
            // Solar Core and Local Planets
            { id: "Sun", name: "Sun", radius: 60, isCustom: true, orbitRadius: 0, speed: 0, angle: 0, 
              draw: (x, y, r) => {
                  let grad = ctx.createRadialGradient(x, y, 0, x, y, r * 2.0);
                  grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.3, '#ffcc00');
                  grad.addColorStop(0.7, '#ff3300'); grad.addColorStop(1, 'rgba(255,51,0,0)');
                  ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, r * 2.0, 0, Math.PI*2); ctx.fill();
              }
            },
            { id: "Mercury", name: "Mercury", radius: 7, color: "#8a8d8f", orbitRadius: 200, speed: 0.012, angle: 0.5, features: 'craters' },
            { id: "Venus", name: "Venus", radius: 12, color: "#e39a5c", orbitRadius: 320, speed: 0.009, angle: 2.1, features: 'atmosphere' },
            { id: "Earth", name: "Earth", radius: 14, color: "#2b82c9", orbitRadius: 450, speed: 0.007, angle: 4.3, features: 'continents' },
            { id: "Mars", name: "Mars", radius: 10, color: "#c1440e", orbitRadius: 580, speed: 0.005, angle: 1.2, features: 'icecaps' },

            // Extreme Exoplanets
            { id: "KELT-9b", name: "KELT-9b (Plasma Atmosphere Exoplanet)", radius: 22, color: "#4488ff", orbitRadius: 900, speed: 0.016, angle: 0, isCustom: true,
              draw: (x, y, r) => {
                  ctx.save(); ctx.translate(x, y);
                  let exGrad = ctx.createRadialGradient(0,0,0, 0,0,r);
                  exGrad.addColorStop(0, '#ffffff'); exGrad.addColorStop(0.4, '#aaddff'); exGrad.addColorStop(1, '#1144ff');
                  ctx.fillStyle = exGrad; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
                  let tailGrad = ctx.createLinearGradient(0,0, 120*zoom, 0);
                  tailGrad.addColorStop(0, 'rgba(170,221,255,0.4)'); tailGrad.addColorStop(1, 'rgba(0,0,0,0)');
                  ctx.fillStyle = tailGrad; ctx.fillRect(0, -r, 120*zoom, r*2); ctx.restore();
              }
            },
            { id: "WASP-76b", name: "WASP-76b (Molten Iron Rain World)", radius: 20, color: "#3a0d0d", orbitRadius: 1150, speed: 0.011, angle: 1.8, features: 'ironclouds' },
            { id: "GJ 1214b", name: "GJ 1214b (Super-Earth Ocean World)", radius: 18, color: "#005577", orbitRadius: 1400, speed: 0.008, angle: 3.5, features: 'deepocean' },
            { id: "Kepler-16b", name: "Kepler-16b (Circumbinary World)", radius: 15, color: "#ccaa88", orbitRadius: 1750, speed: 0.004, angle: 5.1, features: 'binaryshadow' },

            // resonant star system TOI-178
            { id: "TOI-178", name: "TOI-178 Resonant System Chain", radius: 28, fixedX: 3500, fixedY: 3500, isCustom: true,
              draw: (x, y, r) => {
                  let coreGrad = ctx.createRadialGradient(x, y, 0, x, y, r);
                  coreGrad.addColorStop(0, '#fff0dd'); coreGrad.addColorStop(1, '#ffaa44');
                  ctx.fillStyle = coreGrad; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                  ctx.strokeStyle = 'rgba(255,170,68,0.1)'; ctx.lineWidth = 1;
                  for (let rad of [r*2, r*3.2, r*4.5, r*6]) {
                      ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI*2); ctx.stroke();
                      ctx.fillStyle = '#00ffff'; ctx.beginPath(); 
                      let subA = timeGlobal * (15 / rad);
                      ctx.arc(x + Math.cos(subA)*rad, y + Math.sin(subA)*rad, 3*zoom, 0, Math.PI*2); ctx.fill();
                  }
              }
            },

            // SAFE-MODE OPTIMIZED PULSAR (Low Overhead Rendering Core Loops)
            { id: "PSR B1919+21", name: "PSR B1919+21 (Pulsar)", radius: 8, fixedX: 5000, fixedY: -4500, isCustom: true,
              draw: (x, y, r) => {
                  let slowSpin = timeGlobal * 0.15; 
                  ctx.save(); ctx.translate(x, y); ctx.rotate(slowSpin);
                  ctx.lineWidth = Math.max(1, 4 * zoom);
                  let bLength = 1200 * zoom;
                  let jetGrad = ctx.createLinearGradient(0, 0, 0, -bLength);
                  jetGrad.addColorStop(0, '#ffffff'); jetGrad.addColorStop(0.3, 'rgba(0,180,255,0.4)'); jetGrad.addColorStop(1, 'rgba(0,0,0,0)');
                  ctx.strokeStyle = jetGrad;
                  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, -bLength); ctx.stroke();
                  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, bLength); ctx.stroke();
                  ctx.restore();
                  ctx.fillStyle = '#00ffff'; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
              }
            },

            // Deep Space Anomalies & Multiple Detailed Black Holes
            { id: "Gargantua", name: "Gargantua (Supermassive Black Hole)", radius: 35, fixedX: -6000, fixedY: 6000, isCustom: true,
              draw: (x, y, r) => {
                  ctx.save(); ctx.translate(x, y); ctx.rotate(timeGlobal * 0.02);
                  let diskGrad = ctx.createRadialGradient(0,0,r, 0,0,r*5);
                  diskGrad.addColorStop(0, '#ffbb00'); diskGrad.addColorStop(0.2, '#ff3300'); diskGrad.addColorStop(0.7, 'rgba(150,0,255,0.15)'); diskGrad.addColorStop(1, 'rgba(0,0,0,0)');
                  ctx.strokeStyle = diskGrad; ctx.lineWidth = r*1.6;
                  ctx.beginPath(); ctx.ellipse(0,0,r*4.5, r*1.3, Math.PI/5, 0, Math.PI*2); ctx.stroke();
                  ctx.restore(); ctx.fillStyle = '#000000'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
              }
            },
            { id: "Cygnus X-1", name: "Cygnus X-1 (Stellar-Mass Black Hole)", radius: 14, fixedX: -4000, fixedY: 8500, isCustom: true,
              draw: (x, y, r) => {
                  ctx.save(); ctx.translate(x, y); ctx.rotate(-timeGlobal * 0.04);
                  let blueDisk = ctx.createRadialGradient(0,0,r, 0,0,r*3.5);
                  blueDisk.addColorStop(0, '#00ffff'); blueDisk.addColorStop(0.4, '#0044ff'); blueDisk.addColorStop(1, 'rgba(0,0,0,0)');
                  ctx.strokeStyle = blueDisk; ctx.lineWidth = r*0.8;
                  ctx.beginPath(); ctx.ellipse(0,0,r*3, r*0.9, -Math.PI/8, 0, Math.PI*2); ctx.stroke();
                  ctx.restore(); ctx.fillStyle = '#000000'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
              }
            },
            { id: "Einstein Ring", name: "SDSS J1430 (Gravitational Einstein Ring)", radius: 45, fixedX: 7000, fixedY: 2000, isCustom: true,
              draw: (x, y, r) => {
                  ctx.strokeStyle = 'rgba(255,150,0,0.7)'; ctx.lineWidth = Math.max(1, 5*zoom);
                  ctx.beginPath(); ctx.arc(x,y, r*1.2, 0, Math.PI*2); ctx.stroke();
                  ctx.fillStyle = '#3366ff'; ctx.beginPath(); ctx.arc(x,y,4*zoom,0,Math.PI*2); ctx.fill();
              }
            },
            { id: "Sizzling Seven", name: "The Guardians (Septet Star Cluster Cluster)", radius: 50, fixedX: 1000, fixedY: -7500, isCustom: true,
              draw: (x, y, r) => {
                  let offsets = [[0,0], [-20,15], [25,-10], [-10,-25], [30,25], [-35,-5], [10,35]];
                  ctx.fillStyle = '#ffffff';
                  for (let os of offsets) {
                      let sGrad = ctx.createRadialGradient(x+os[0]*zoom, y+os[1]*zoom, 0, x+os[0]*zoom, y+os[1]*zoom, 12*zoom);
                      sGrad.addColorStop(0, '#ffffff'); sGrad.addColorStop(0.3, '#bbddff'); sGrad.addColorStop(1, 'rgba(0,0,0,0)');
                      ctx.fillStyle = sGrad; ctx.beginPath(); ctx.arc(x+os[0]*zoom, y+os[1]*zoom, 12*zoom, 0, Math.PI*2); ctx.fill();
                  }
              }
            },
            { id: "Hoag's Object", name: "Hoag's Object (Perfect Ring Galaxy)", radius: 130, fixedX: -8000, fixedY: -3000, isCustom: true,
              draw: (x, y, r) => {
                  let coreGrad = ctx.createRadialGradient(x, y, 0, x, y, r*0.15);
                  coreGrad.addColorStop(0, '#ffffcc'); coreGrad.addColorStop(1, 'rgba(255,230,170,0)');
                  ctx.fillStyle = coreGrad; ctx.beginPath(); ctx.arc(x,y,r*0.15,0,Math.PI*2); ctx.fill();
                  ctx.strokeStyle = 'rgba(100,180,255,0.25)'; ctx.lineWidth = r*0.3;
                  ctx.beginPath(); ctx.arc(x,y,r*0.8, 0, Math.PI*2); ctx.stroke();
              }
            },
            { id: "Bootes Void", name: "The Böotes Void (Universal Vacuum Horizon)", radius: 650, fixedX: -8500, fixedY: -8500, isCustom: true,
              draw: (x, y, r) => {
                  let voidGrad = ctx.createRadialGradient(x, y, r * 0.3, x, y, r);
                  voidGrad.addColorStop(0, '#010103'); voidGrad.addColorStop(0.8, 'rgba(2,2,7,0.9)'); voidGrad.addColorStop(1, 'rgba(2,2,7,0)');
                  ctx.fillStyle = voidGrad; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
                  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.strokeStyle = 'rgba(255, 0, 50, 0.12)';
                  ctx.lineWidth = Math.max(1, 1.5 * zoom); ctx.setLineDash([4 * zoom, 10 * zoom]); ctx.stroke(); ctx.setLineDash([]);
              }
            }
        ];
