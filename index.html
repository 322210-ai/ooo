<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal Sandbox Simulator v2.0</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Courier New', Courier, monospace;
            color: #00ffaa;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: grab;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #gameCanvas:active {
            cursor: grabbing;
        }
        /* HUD UI Containers */
        .panel {
            position: absolute;
            background: rgba(2, 2, 8, 0.96);
            border: 1px solid #00ffaa;
            border-radius: 6px;
            padding: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 170, 0.15);
            z-index: 10;
            pointer-events: auto;
        }
        #topControls {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            align-items: center;
        }
        #leftMatrix {
            top: 20px;
            left: 20px;
            width: 280px;
            pointer-events: none;
            line-height: 1.4;
        }
        #rightInspector {
            top: 20px;
            right: 20px;
            width: 320px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            display: none;
            border-color: #00ffff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.15);
        }
        .heading {
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px solid #00ffaa;
            padding-bottom: 4px;
            text-transform: uppercase;
            font-size: 13px;
        }
        .text-cyan { color: #00ffff; }
        .text-magenta { color: #ff00ff; }
        .text-amber { color: #ffaa00; }
        
        .nav-btn {
            background: rgba(0, 255, 170, 0.1);
            color: #00ffaa;
            border: 1px solid #00ffaa;
            padding: 6px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .nav-btn:hover {
            background: rgba(0, 255, 170, 0.3);
            box-shadow: 0 0 10px #00ffaa;
        }
        #pauseBtn {
            border-color: #ffaa00;
            color: #ffaa00;
            background: rgba(255, 170, 0, 0.05);
        }
        #pauseBtn.paused {
            background: rgba(255, 0, 0, 0.2);
            border-color: #ff3333;
            color: #ff3333;
        }
    </style>
</head>
<body>

    <div id="topControls" class="panel">
        <button id="backLayerBtn" class="nav-btn" onclick="ascendLayer()">⏮ Ascend View</button>
        <button id="pauseBtn" class="nav-btn" onclick="toggleSimulation()"></div>
        <button id="macroViewBtn" class="nav-btn" onclick="resetZoom()">🔍 Reset View</button>
    </div>

    <div id="leftMatrix" class="panel">
        <div class="heading">🛰️ Telemetry Matrix</div>
        <div id="currentLayerDisplay">Scope: Cosmic Web</div>
        <div id="coords">Vector: X=0, Y=0</div>
        <div id="zoom">Field Factor: 1.00x</div>
    </div>

    <div id="rightInspector" class="panel"></div>

    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Robust Canvas Device Pixel Scaling for Chromebook Displays
        function resizeCanvas() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Universe State Engine Constants
        const VISUAL_LAYERS = { COSMIC: 0, GALACTIC: 1, SOLAR: 2 };
        let activeLayer = VISUAL_LAYERS.COSMIC;
        let isSimulationRunning = true;
        let timeGlobal = 0;

        // Viewport Coordinates and Focus Targets
        let cameraX = 0; let cameraY = 0; let zoom = 0.5;
        let targetCameraX = 0; let targetCameraY = 0; let targetZoom = 0.5;
        let isDragging = false; let lastMouseX = 0; let lastMouseY = 0;
        let hoveredEntity = null;

        // Persistent Simulation Data Registries
        let activeGalaxies = [];
        let activeNebulae = [];
        let activeStarSystems = [];
        let activePlanets = [];

        let selectedGalaxyIndex = null;
        let selectedStarSystemIndex = null;

        // Deep Field Parallax Star Clusters Matrix Arrays
        const starsLayer1 = [];
        const starsLayer2 = [];
        const starsLayer3 = [];
        const skyNebulae = [];

        function generateDeepSky() {
            // Populate background star field arrays over a broad rendering grid
            for (let i = 0; i < 800; i++) {
                starsLayer1.push({ x: (Math.random() - 0.5) * 16000, y: (Math.random() - 0.5) * 16000, r: Math.random() * 0.8 + 0.2 });
            }
            for (let i = 0; i < 500; i++) {
                starsLayer2.push({ x: (Math.random() - 0.5) * 16000, y: (Math.random() - 0.5) * 16000, r: Math.random() * 1.4 + 0.6 });
            }
            for (let i = 0; i < 200; i++) {
                starsLayer3.push({ x: (Math.random() - 0.5) * 16000, y: (Math.random() - 0.5) * 16000, r: Math.random() * 2.5 + 1.2, phase: Math.random() * Math.PI });
            }
            
            // Generate volumetric background space dust patches
            const cloudColors = [
                'rgba(140, 0, 200, 0.04)', 'rgba(0, 70, 220, 0.04)', 
                'rgba(0, 160, 120, 0.03)', 'rgba(200, 0, 70, 0.03)'
            ];
            for (let i = 0; i < 60; i++) {
                skyNebulae.push({
                    x: (Math.random() - 0.5) * 14000,
                    y: (Math.random() - 0.5) * 14000,
                    r: Math.random() * 1200 + 400,
                    color: cloudColors[Math.floor(Math.random() * cloudColors.length)]
                });
            }
        }
        generateDeepSky();
        // Procedural Naming Matrix Catalogs
        const galaxyPrefixes = ["Andromeda", "MilkyWay", "Triangulum", "Sombrero", "Whirlpool", "Centaurus", "Bode", "Cartwheel", "Cosmic", "Helix"];
        const systemPrefixes = ["Alpha", "Kepler", "Gliese", "Wasp", "Kelt", "TOI", "HD", "PSR", "Vega", "Sirius", "Proxima"];
        const planetPrefixes = ["Prime", "b", "c", "d", "e", "f", "g", "Major", "Minor", "Vera", "Zeta"];

        // Scientific Fact Templates
        const planetFactualTemplates = {
            craters: { desc: "Airless, scarred rocky world with severe tectonic fractures and impact basins.", comp: "Silicate Rock, Iron Core", gravity: "0.38g", temp: "167°C / -173°C", hazard: "Extreme Radiation" },
            atmosphere: { desc: "Superheated atmospheric pressure matrix running dense sulfuric cloud structures.", comp: "Carbon Dioxide, Nitrogen", gravity: "0.91g", temp: "464°C", hazard: "Acid Rain, Crushing Pressure" },
            continents: { desc: "Biologically active garden world featuring liquid water oceans and an oxygenated troposphere.", comp: "Water, Nitrogen, Oxygen", gravity: "1.00g", temp: "15°C", hazard: "None Detected" },
            icecaps: { desc: "Sub-zero desert planet showing iron-oxide silt dunes and frozen carbon dioxide poles.", comp: "Iron-Rich Basalt, CO2 Ice", gravity: "0.37g", temp: "-62°C", hazard: "Dust Storms" },
            rings: { desc: "Low-density gas giant surrounded by a massive, highly reflective ice-particle ring disk.", comp: "Hydrogen, Helium, Water Ice", gravity: "0.93g", temp: "-138°C", hazard: "Ring Shearing" }
        };

        // Core Catalog Data Map Builder
        function generateUniverseMap() {
            activeGalaxies = [];
            resizeCanvas();
            cameraX = 0; cameraY = 0; targetCameraX = 0; targetCameraY = 0;
            zoom = 0.5; targetZoom = 0.5;

            // 1. Generate Explicit Core Real-World Galaxies
            activeGalaxies.push({
                name: "Milky Way Galaxy", x: 0, y: 0, r: 180, type: "spiral", density: 140, spin: 0.002,
                desc: "Home galaxy of humanity. Features a massive central core barred structure and four primary evolutionary spiral star arms."
            });
            activeGalaxies.push({
                name: "Andromeda Galaxy (M31)", x: 1200, y: -900, r: 220, type: "spiral", density: 180, spin: -0.001,
                desc: "The largest local cluster group galaxy, currently on an active multi-billion-year gravitational collision course with the Milky Way."
            });
            activeGalaxies.push({
                name: "Sombrero Galaxy (M104)", x: -1400, y: 1200, r: 150, type: "elliptical", density: 110, spin: 0.0005,
                desc: "Features an unusually large central bulge and an incredibly prominent, dark, opaque dust lane tracking around its core perimeter."
            });
            activeGalaxies.push({
                name: "Hoag's Object", x: -2000, y: -1600, r: 110, type: "ring", density: 90, spin: 0.004,
                desc: "An incredibly rare, perfect ring galaxy formation showcasing an isolated outer ring of hot blue stars circling an older yellow nucleus."
            });

            // 2. Procedural Deep-Field Galaxies Array Generation
            for (let i = 0; i < 45; i++) {
                let ang = Math.random() * Math.PI * 2;
                let dist = Math.random() * 5000 + 1500;
                let typeRoll = Math.random();
                activeGalaxies.push({
                    name: galaxyPrefixes[Math.floor(Math.random() * galaxyPrefixes.length)] + " Variant-" + Math.floor(Math.random() * 900 + 100),
                    x: Math.cos(ang) * dist, y: Math.sin(ang) * dist,
                    r: Math.random() * 90 + 50,
                    type: typeRoll < 0.5 ? "spiral" : (typeRoll < 0.85 ? "elliptical" : "ring"),
                    density: Math.floor(Math.random() * 60 + 60),
                    spin: (Math.random() - 0.5) * 0.002,
                    desc: "A distant, ancient cosmic island system mapped by long-range deep space quantum telescope telemetry arrays."
                });
            }
        }
        function populateGalaxySystems(galIdx) {
            activeStarSystems = []; activeNebulae = [];
            let gal = activeGalaxies[galIdx];
            let seedValue = 0;
            for (let charIdx = 0; charIdx < gal.name.length; charIdx++) { seedValue += gal.name.charCodeAt(charIdx); }
            function seededRandom() { let x = Math.sin(seedValue++) * 10000; return x - Math.floor(x); }

            const colors = ['rgba(255,0,150,', 'rgba(0,180,255,', 'rgba(0,255,150,', 'rgba(255,100,0,'];
            for (let i = 0; i < 6; i++) {
                let rAng = seededRandom() * Math.PI * 2; let rRad = seededRandom() * gal.r * 2.5;
                activeNebulae.push({
                    name: systemPrefixes[Math.floor(seededRandom() * systemPrefixes.length)] + " Cosmic Nursery",
                    x: Math.cos(rAng) * rRad, y: Math.sin(rAng) * rRad, r: seededRandom() * 400 + 200,
                    color: colors[Math.floor(seededRandom() * colors.length)] + '0.04)'
                });
            }

            activeStarSystems.push({ name: "Central Supermassive Black Hole", x: 0, y: 0, starType: "blackhole", radius: 25, planetsCount: 0 });

            let count = gal.density;
            for (let i = 0; i < count; i++) {
                let sysX = 0; let sysY = 0;
                if (gal.type === "spiral") {
                    let arm = Math.floor(seededRandom() * 4); let angle = (arm * Math.PI / 2) + (seededRandom() * 2.5);
                    let distance = (seededRandom() * gal.r * 4.5) + 80; angle += distance * 0.0025;
                    sysX = Math.cos(angle) * distance + (seededRandom() - 0.5) * 60;
                    sysY = Math.sin(angle) * distance + (seededRandom() - 0.5) * 60;
                } else if (gal.type === "ring") {
                    let angle = seededRandom() * Math.PI * 2; let distance = gal.r * 3.5 + (seededRandom() - 0.5) * 50;
                    if (seededRandom() < 0.15) distance = seededRandom() * 40;
                    sysX = Math.cos(angle) * distance; sysY = Math.sin(angle) * distance;
                } else {
                    let angle = seededRandom() * Math.PI * 2; let distance = seededRandom() * gal.r * 3.8;
                    sysX = Math.cos(angle) * distance; sysY = Math.sin(angle) * distance;
                }

                let rollType = seededRandom(); let type = "star-yellow";
                if (rollType < 0.25) type = "star-blue";
                else if (rollType < 0.45) type = "star-red";
                else if (rollType < 0.52) type = "pulsar";

                activeStarSystems.push({
                    name: systemPrefixes[Math.floor(seededRandom() * systemPrefixes.length)] + " System-" + Math.floor(seededRandom() * 900 + 100),
                    x: sysX, y: sysY, starType: type, radius: type === "pulsar" ? 7 : (type === "star-blue" ? 22 : 14), planetsCount: Math.floor(seededRandom() * 6) + 3
                });
            }

            if (gal.name === "Milky Way Galaxy") {
                activeStarSystems.push({ name: "Sol System (Solar Core)", x: 280, y: 190, starType: "star-yellow", radius: 18, planetsCount: 6, isSol: true });
                activeStarSystems.push({ name: "PSR B1919+21 (First Pulsar Discovered)", x: 900, y: -700, starType: "pulsar", radius: 6, planetsCount: 2 });
                activeStarSystems.push({ name: "Gargantua Accretion Anomaly", x: -1100, y: 1300, starType: "blackhole", radius: 16, planetsCount: 4 });
            }
        }

        function populateSystemPlanets(sysIdx) {
            activePlanets = [];
            let sys = activeStarSystems[sysIdx];
            if (sys.starType === "blackhole" && sys.planetsCount === 0) return;

            let seedValue = 0;
            for (let charIdx = 0; charIdx < sys.name.length; charIdx++) { seedValue += sys.name.charCodeAt(charIdx); }
            function seededRandom() { let x = Math.sin(seedValue++) * 10000; return x - Math.floor(x); }

            if (sys.isSol) {
                activePlanets.push({ name: "Mercury", orbitRadius: 150, radius: 7, color: "#95989a", speed: 0.022, angle: seededRandom()*6, type: "craters", mass: "0.055 Earths", size: "4,879 km", density: "5.43 g/cm³", fact: planetFactualTemplates.craters });
                activePlanets.push({ name: "Venus", orbitRadius: 240, radius: 13, color: "#e6a163", speed: 0.016, angle: seededRandom()*6, type: "atmosphere", mass: "0.815 Earths", size: "12,104 km", density: "5.24 g/cm³", fact: planetFactualTemplates.atmosphere });
                activePlanets.push({ name: "Earth", orbitRadius: 350, radius: 15, color: "#3289d6", speed: 0.012, angle: seededRandom()*6, type: "continents", mass: "1.000 Earths", size: "12,742 km", density: "5.51 g/cm³", fact: planetFactualTemplates.continents });
                activePlanets.push({ name: "Mars", orbitRadius: 460, radius: 10, color: "#d14b15", speed: 0.009, angle: seededRandom()*6, type: "icecaps", mass: "0.107 Earths", size: "6,779 km", density: "3.93 g/cm³", fact: planetFactualTemplates.icecaps });
                activePlanets.push({ name: "Jupiter", orbitRadius: 620, radius: 34, color: "#d8a06d", speed: 0.005, angle: seededRandom()*6, type: "atmosphere", mass: "317.8 Earths", size: "139,820 km", density: "1.33 g/cm³", fact: { desc: "Massive gas giant featuring active atmospheric storm belts and the Great Red Spot.", comp: "Hydrogen, Helium Gas Layers", gravity: "2.52g", temp: "-108°C", hazard: "Atmospheric Shearing, Severe Gravitational Pull" } });
                activePlanets.push({ name: "Saturn", orbitRadius: 780, radius: 28, color: "#e2bf7d", speed: 0.003, angle: seededRandom()*6, type: "rings", mass: "95.2 Earths", size: "116,460 km", density: "0.69 g/cm³", fact: planetFactualTemplates.rings });
                return;
            }

            let baseOrbit = 160;
            for (let i = 0; i < sys.planetsCount; i++) {
                baseOrbit += (seededRandom() * 90) + 60;
                let rollType = seededRandom();
                let type = "craters"; let color = "#888888";
                let name = sys.name.split(" ")[0] + "-" + planetPrefixes[i];
                let mass = (seededRandom() * 5).toFixed(2) + " Earths";
                let size = Math.floor(seededRandom() * 20000 + 3000) + " km";
                let density = (seededRandom() * 3 + 3).toFixed(2) + " g/cm³";
                let customFact = null;

                if (rollType < 0.25) { type = "craters"; color = "#7a7d80"; } 
                else if (rollType < 0.50) { type = "atmosphere"; color = "#cca37a"; } 
                else if (rollType < 0.70) { type = "icecaps"; color = "#b0c4de"; } 
                else if (rollType < 0.88) { type = "rings"; color = "#deb887"; } 
                else {
                    type = "atmosphere";
                    if (seededRandom() < 0.5) {
                        name = "Kelt-9b Variant"; color = "#ff4500"; mass = "915.4 Earths"; size = "200,000 km";
                        customFact = { desc: "Ultra-hot Jupiter locked in a tight stellar warp loop. Daytime radiation rips molecules apart.", comp: "Ionized Titanium, Iron Dust", gravity: "4.20g", temp: "4,300°C", hazard: "Extreme Thermal Disintegration" };
                    } else {
                        name = "Wasp-76b Variant"; color = "#3b0066"; mass = "292.1 Earths"; size = "170,000 km";
                        customFact = { desc: "Extreme atmospheric gradients cause vaporized gaseous iron to condense and rain down as liquid metal on the dark side.", comp: "Iron Vapor, Silicates", gravity: "2.10g", temp: "2,400°C", hazard: "Liquid Iron Precipitation" };
                    }
                }

                activePlanets.push({
                    name: name, orbitRadius: baseOrbit, radius: type === "rings" ? seededRandom() * 10 + 14 : seededRandom() * 12 + 6,
                    color: color, speed: (0.02 * 150) / baseOrbit, angle: seededRandom() * Math.PI * 2, type: type, mass: mass, size: size, density: density, fact: customFact || planetFactualTemplates[type]
                });
            }
        }
        // Rendering Shaders for Stellar Objects & Advanced Accretion Disks
        function drawCustomCelestialObject(body, screenX, screenY, scaledRadius) {
            if (body.starType === "blackhole") {
                ctx.save();
                ctx.translate(screenX, screenY);
                ctx.rotate(timeGlobal * 0.015);
                
                // Realistic Accretion Disk Simulation and Gravitational Lensing
                let diskGrad = ctx.createRadialGradient(0, 0, scaledRadius * 1.1, 0, 0, scaledRadius * 5);
                diskGrad.addColorStop(0, '#ffaa00');
                diskGrad.addColorStop(0.2, '#ff3300');
                diskGrad.addColorStop(0.6, 'rgba(80,0,220,0.15)');
                diskGrad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.strokeStyle = diskGrad;
                ctx.lineWidth = scaledRadius * 1.8;
                
                ctx.beginPath();
                ctx.ellipse(0, 0, scaledRadius * 4.5, scaledRadius * 1.5, Math.PI / 6, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
                
                // Infinite Dark Event Horizon Hole Center Void Core
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(screenX, screenY, scaledRadius * 0.9, 0, Math.PI * 2);
                ctx.fill();
            }
            else if (body.starType === "pulsar") {
                let spin = timeGlobal * 0.12; // Modulated rotation speed to prevent processing overhead freeze
                ctx.save();
                ctx.translate(screenX, screenY);
                ctx.rotate(spin);
                
                // Blazing Radiation Beam Emitter Loops
                for (let angleOffset of [0, Math.PI]) {
                    ctx.save();
                    ctx.rotate(angleOffset);
                    let jetGrad = ctx.createLinearGradient(0, 0, 0, -2000 * zoom);
                    jetGrad.addColorStop(0, '#ffffff');
                    jetGrad.addColorStop(0.3, 'rgba(0,180,255,0.25)');
                    jetGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = jetGrad;
                    
                    ctx.beginPath();
                    ctx.moveTo(-4 * zoom, 0); ctx.lineTo(4 * zoom, 0);
                    ctx.lineTo(60 * zoom, -2000 * zoom); ctx.lineTo(-60 * zoom, -2000 * zoom);
                    ctx.closePath(); ctx.fill();
                    ctx.restore();
                }
                ctx.restore();
                
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(screenX, screenY, scaledRadius * 1.4, 0, Math.PI * 2);
                ctx.fill();
            }
            else {
                let sunColor = "#ffea00"; let flareColor = "#ff5500";
                if (body.starType === "star-blue") { sunColor = "#ffffff"; flareColor = "#00ffff"; }
                if (body.starType === "star-red") { sunColor = "#ff3333"; flareColor = "#880000"; }
                
                let dynamicPulse = Math.sin(timeGlobal * 0.04) * (scaledRadius * 0.05);
                let coreGrad = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, scaledRadius + dynamicPulse);
                coreGrad.addColorStop(0, '#ffffff');
                coreGrad.addColorStop(0.2, sunColor);
                coreGrad.addColorStop(0.6, flareColor);
                coreGrad.addColorStop(1, 'rgba(0,0,0,0)');
                
                ctx.fillStyle = coreGrad;
                ctx.beginPath();
                ctx.arc(screenX, screenY, (scaledRadius + dynamicPulse) * 2.2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Detailed Planet Texture Painter & Shadows Model
        function renderPlanetTexture(ctx, radius, body) {
            ctx.save();
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, Math.PI * 2);
            ctx.clip();
            
            ctx.fillStyle = body.color;
            ctx.fillRect(-radius, -radius, radius * 2, radius * 2);
            
            if (body.type === 'craters') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                ctx.beginPath(); ctx.arc(-radius * 0.3, -radius * 0.2, radius * 0.25, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(radius * 0.4, radius * 0.3, radius * 0.2, 0, Math.PI * 2); ctx.fill();
            } 
            else if (body.type === 'atmosphere') {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.fillRect(-radius, -radius * 0.4, radius * 2, radius * 0.2);
                ctx.fillRect(-radius, radius * 0.3, radius * 2, radius * 0.15);
            } 
            else if (body.type === 'continents') {
                ctx.fillStyle = '#1e7b1e';
                ctx.beginPath();
                ctx.ellipse(-radius * 0.2, -radius * 0.1, radius * 0.5, radius * 0.4, 0, 0, Math.PI * 2);
                ctx.ellipse(radius * 0.3, radius * 0.2, radius * 0.4, Math.max(1, radius * 0.4), Math.PI / 4, 0, Math.PI * 2);
                ctx.fill();
            } 
            else if (body.type === 'icecaps') {
                ctx.fillStyle = '#ffffff';
                ctx.beginPath(); ctx.arc(0, -radius * 0.8, radius * 0.35, 0, Math.PI, false); ctx.fill();
            }
            
            let shadowGrad = ctx.createLinearGradient(-radius, -radius, radius, radius);
            shadowGrad.addColorStop(0, 'rgba(255,255,255,0.05)');
            shadowGrad.addColorStop(1, 'rgba(0,0,0,0.85)');
            ctx.fillStyle = shadowGrad;
            ctx.fillRect(-radius, -radius, radius * 2, radius * 2);
            ctx.restore();
            
            if (body.type === 'rings') {
                ctx.strokeStyle = 'rgba(210, 180, 140, 0.6)';
                ctx.lineWidth = Math.max(1, radius * 0.45);
                ctx.save();
                ctx.scale(1.8, 0.4);
                ctx.beginPath();
                ctx.arc(0, 0, radius * 0.85, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }
        // Intercept and Compile Live Hover Statistics
        function inspectEntityDetails(entity, layerType) {
            let inspector = document.getElementById('rightInspector');
            if (!entity) {
                inspector.style.display = 'none';
                return;
            }
            
            inspector.style.display = 'block';
            let content = "";

            if (layerType === VISUAL_LAYERS.COSMIC) {
                content = `
                    <div class="heading" style="color:#00ffaa">🌌 Galaxy Diagnostic</div>
                    <div style="font-size:16px;font-weight:bold;margin-bottom:8px;">${entity.name}</div>
                    <div style="color:#88aaaa;margin-bottom:12px;font-size:11px;">${entity.desc}</div>
                    <div><span class="text-cyan">Morphology:</span> ${entity.type.toUpperCase()}</div>
                    <div><span class="text-cyan">Star Density:</span> ~${entity.density} Billion Cores</div>
                    <div><span class="text-cyan">Kinetic Spin:</span> ${(entity.spin * 1000).toFixed(2)} rad/s</div>
                    <div style="margin-top:15px;border-top:1px dashed #446655;padding-top:10px;text-align:center;color:#ffaa00;font-size:11px;">
                        [ CLICK TO OPEN GALAXY ]
                    </div>
                `;
            } 
            else if (layerType === VISUAL_LAYERS.GALACTIC) {
                let typeName = entity.starType.replace("star-", "").toUpperCase();
                content = `
                    <div class="heading" style="color:#ff00ff">📡 Stellar Readout</div>
                    <div style="font-size:16px;font-weight:bold;margin-bottom:8px;">${entity.name}</div>
                    <div><span class="text-magenta">Classification:</span> ${typeName}</div>
                    <div><span class="text-magenta">Planetary Cores:</span> ${entity.planetsCount} Satellites</div>
                    <div><span class="text-magenta">Coordinates:</span> [X: ${Math.round(entity.x)}, Y: ${Math.round(entity.y)}]</div>
                    <div style="margin-top:15px;border-top:1px dashed #446655;padding-top:10px;text-align:center;color:#00ffff;font-size:11px;">
                        [ CLICK TO MAP ORBITS ]
                    </div>
                `;
            } 
            else if (layerType === VISUAL_LAYERS.SOLAR) {
                content = `
                    <div class="heading" style="color:#00ffff">🪐 Telemetry Matrix</div>
                    <div style="font-size:18px;font-weight:bold;margin-bottom:4px;color:#ffffff;">${entity.name}</div>
                    <div style="font-size:11px;color:#88ffcc;margin-bottom:12px;text-transform:uppercase;">Class: ${entity.type} World</div>
                    <div style="color:#ccffff;font-size:12px;line-height:1.4;margin-bottom:12px;background:rgba(0,50,50,0.3);padding:8px;border-left:2px solid #00ffff;">
                        ${entity.fact.desc}
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;">
                        <div><span class="text-cyan">Mass Scale:</span></div><div>${entity.mass}</div>
                        <div><span class="text-cyan">Core Volume:</span></div><div>${entity.size}</div>
                        <div><span class="text-cyan">Bulk Density:</span></div><div>${entity.density}</div>
                        <div><span class="text-cyan">Local Gravity:</span></div><div>${entity.fact.gravity}</div>
                        <div><span class="text-cyan">Mean Thermal:</span></div><div>${entity.fact.temp}</div>
                    </div>
                    <div style="margin-top:12px;color:#ff3333;font-size:11px;font-weight:bold;border-top:1px dashed #ff3333;padding-top:8px;">
                        ⚠️ HAZARD: ${entity.fact.hazard}
                    </div>
                `;
            }

            inspector.innerHTML = content;
        }

        // Layer Switching Controls
        function selectEntityLayer(entity, currentLayer) {
            if (currentLayer === VISUAL_LAYERS.COSMIC) {
                let idx = activeGalaxies.indexOf(entity);
                if (idx !== -1) {
                    selectedGalaxyIndex = idx;
                    populateGalaxySystems(idx);
                    activeLayer = VISUAL_LAYERS.GALACTIC;
                    document.getElementById('currentLayerDisplay').innerText = "Scope: Galactic Cluster";
                    cameraX = 0; cameraY = 0; zoom = 0.5;
                    targetCameraX = 0; targetCameraY = 0; targetZoom = 0.5;
                }
            } 
            else if (currentLayer === VISUAL_LAYERS.GALACTIC) {
                let idx = activeStarSystems.indexOf(entity);
                if (idx !== -1 && entity.starType !== "blackhole") {
                    selectedStarSystemIndex = idx;
                    populateSystemPlanets(idx);
                    activeLayer = VISUAL_LAYERS.SOLAR;
                    document.getElementById('currentLayerDisplay').innerText = "Scope: Solar Orbital";
                    cameraX = 0; cameraY = 0; zoom = 0.6;
                    targetCameraX = 0; targetCameraY = 0; targetZoom = 0.6;
                }
            }
            inspectEntityDetails(null);
        }

        function ascendLayer() {
            if (activeLayer === VISUAL_LAYERS.SOLAR) {
                activeLayer = VISUAL_LAYERS.GALACTIC;
                document.getElementById('currentLayerDisplay').innerText = "Scope: Galactic Cluster";
                cameraX = activeStarSystems[selectedStarSystemIndex].x;
                cameraY = activeStarSystems[selectedStarSystemIndex].y;
                targetCameraX = cameraX; targetCameraY = cameraY;
                zoom = 0.5; targetZoom = 0.5;
            } 
            else if (activeLayer === VISUAL_LAYERS.GALACTIC) {
                activeLayer = VISUAL_LAYERS.COSMIC;
                document.getElementById('currentLayerDisplay').innerText = "Scope: Cosmic Web";
                cameraX = activeGalaxies[selectedGalaxyIndex].x;
                cameraY = activeGalaxies[selectedGalaxyIndex].y;
                targetCameraX = cameraX; targetCameraY = cameraY;
                zoom = 0.4; targetZoom = 0.4;
            }
            inspectEntityDetails(null);
        }

        // Simulation State Controls
        function toggleSimulation() {
            isSimulationRunning = !isSimulationRunning;
            let btn = document.getElementById('pauseBtn');
            if (isSimulationRunning) {
                btn.innerText = "⏸ Simulation: ACTIVE";
                btn.classList.remove('paused');
            } else {
                btn.innerText = "▶ Simulation: PAUSED";
                btn.classList.add('paused');
            }
        }
        
        // Setup initial text template for pause button label
        document.getElementById('pauseBtn').innerText = "⏸ Simulation: ACTIVE";

        function resetZoom() {
            targetCameraX = 0; targetCameraY = 0;
            targetZoom = activeLayer === VISUAL_LAYERS.COSMIC ? 0.4 : 0.6;
        }
        // Mouse and Touch Click Interceptors
        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('.panel')) return;
            isDragging = true;
            lastMouseX = e.clientX; lastMouseY = e.clientY;
        });
        // Screen Drag Panning Handler
        window.addEventListener('mousemove', (e) => {
            const centerX = canvas.width / 2; const centerY = canvas.height / 2;
            let mx = (e.clientX - centerX) / zoom + cameraX;
            let my = (e.clientY - centerY) / zoom + cameraY;

            if (isDragging) {
                const deltaX = e.clientX - lastMouseX;
                const deltaY = e.clientY - lastMouseY;
                cameraX -= deltaX / zoom; cameraY -= deltaY / zoom;
                targetCameraX = cameraX; targetCameraY = cameraY;
                lastMouseX = e.clientX; lastMouseY = e.clientY;
            }
            // Proximity Hover Detection Matrix
            let found = null;
            if (activeLayer === VISUAL_LAYERS.COSMIC) {
                activeGalaxies.forEach(gal => {
                    let dx = mx - gal.x; let dy = my - gal.y;
                    if (Math.sqrt(dx*dx + dy*dy) < gal.r * 1.5) found = gal;
                });
            } 
            else if (activeLayer === VISUAL_LAYERS.GALACTIC) {
                activeStarSystems.forEach(sys => {
                    let dx = mx - sys.x; let dy = my - sys.y;
                    if (Math.sqrt(dx*dx + dy*dy) < Math.max(20, sys.radius * 2)) found = sys;
                });
            } 
            else if (activeLayer === VISUAL_LAYERS.SOLAR) {
                activePlanets.forEach(p => {
                    let px = p.orbitRadius * Math.cos(p.angle);
                    let py = p.orbitRadius * Math.sin(p.angle);
                    let dx = mx - px; let dy = my - py;
                    if (Math.sqrt(dx*dx + dy*dy) < Math.max(15, p.radius * 1.2)) found = p;
                });
            }

            if (found !== hoveredEntity) {
                hoveredEntity = found;
                inspectEntityDetails(found, activeLayer);
            }
        });
        // Mouse Up and Click Release Listeners
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mouseleave', () => isDragging = false);

        // Zoom Scale Wheel Adjustment Matrix
        window.addEventListener('wheel', (e) => {
            if (e.deltaY < 0) targetZoom *= 1.3;
            else targetZoom /= 1.3;
            targetZoom = Math.max(0.01, Math.min(targetZoom, 5.0));
        });
        // Click and Navigation Triggers
        window.addEventListener('click', (e) => {
            if (e.target.closest('.panel')) return;
            if (hoveredEntity && activeLayer !== VISUAL_LAYERS.SOLAR) {
                selectEntityLayer(hoveredEntity, activeLayer);
            }
        });
        // Physics Engine Matrix Updater
        function updatePhysics() {
            if (!isSimulationRunning) return;
            timeGlobal += 1;

            if (activeLayer === VISUAL_LAYERS.COSMIC) {
                activeGalaxies.forEach(gal => { gal.angle = (gal.angle || 0) + gal.spin; });
            } 
            else if (activeLayer === VISUAL_LAYERS.SOLAR) {
                activePlanets.forEach(p => { p.angle += p.speed; });
            }
        }
        // Screen Renderer and Ambient Nebula Layer Setup
        function render() {
            ctx.fillStyle = '#010103'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2; const centerY = canvas.height / 2;

            skyNebulae.forEach(neb => {
                const screenX = (neb.x - cameraX) * zoom + centerX; 
                const screenY = (neb.y - cameraY) * zoom + centerY; 
                const scaledRadius = neb.r * zoom;
                if (screenX + scaledRadius > 0 && screenX - scaledRadius < canvas.width && screenY + scaledRadius > 0 && screenY - scaledRadius < canvas.height) {
                    let grad = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, scaledRadius);
                    grad.addColorStop(0, neb.color); grad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(screenX, screenY, scaledRadius, 0, Math.PI * 2); ctx.fill();
                }
            });
            // Parallax Starfields Layer Draw Node
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            starsLayer1.forEach(st => {
                let screenX = (st.x - cameraX * 0.3) * zoom + centerX; let screenY = (st.y - cameraY * 0.3) * zoom + centerY;
                if (screenX >= 0 && screenX <= canvas.width && screenY >= 0 && screenY <= canvas.height) ctx.fillRect(screenX, screenY, st.r, st.r);
            });

            ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
            starsLayer2.forEach(st => {
                let screenX = (st.x - cameraX * 0.6) * zoom + centerX; let screenY = (st.y - cameraY * 0.6) * zoom + centerY;
                if (screenX >= 0 && screenX <= canvas.width && screenY >= 0 && screenY <= canvas.height) {
                    ctx.beginPath(); ctx.arc(screenX, screenY, st.r, 0, Math.PI * 2); ctx.fill();
                }
            });

            starsLayer3.forEach(st => {
                let screenX = (st.x - cameraX * 0.9) * zoom + centerX; let screenY = (st.y - cameraY * 0.9) * zoom + centerY;
                if (screenX >= 0 && screenX <= canvas.width && screenY >= 0 && screenY <= canvas.height) {
                    let blink = Math.sin(timeGlobal * 0.04 + st.phase) * 0.4 + 0.6;
                    ctx.fillStyle = `rgba(200, 240, 255, ${blink})`;
                    ctx.beginPath(); ctx.arc(screenX, screenY, st.r, 0, Math.PI * 2); ctx.fill();
                }
            });
            // Visual Layers Rendering router
            if (activeLayer === VISUAL_LAYERS.COSMIC) {
                activeGalaxies.forEach(gal => {
                    const screenX = (gal.x - cameraX) * zoom + centerX; 
                    const screenY = (gal.y - cameraY) * zoom + centerY; 
                    const scaledRadius = gal.r * zoom;
                    if (screenX + scaledRadius < 0 || screenX - scaledRadius > canvas.width || screenY + scaledRadius < 0 || screenY - scaledRadius > canvas.height) return;

                    ctx.save(); ctx.translate(screenX, screenY); ctx.rotate(gal.angle || 0);
                    let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, scaledRadius);
                    grad.addColorStop(0, gal.type === 'spiral' ? '#ffffff' : (gal.type === 'ring' ? '#ffeecc' : '#ffddbb'));
                    grad.addColorStop(0.3, gal.type === 'spiral' ? '#00ffff' : '#ffaa00');
                    grad.addColorStop(0.8, '#ff00ff'); grad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = grad;
                    
                    ctx.beginPath();
                    if (gal.type === 'spiral') ctx.ellipse(0, 0, scaledRadius * 1.8, scaledRadius * 0.7, 0, 0, Math.PI * 2);
                    else ctx.arc(0, 0, scaledRadius * 1.2, 0, Math.PI * 2);
                    ctx.fill(); ctx.restore();

                    ctx.font = "12px 'Courier New'"; ctx.fillStyle = '#ffffff';
                    ctx.fillText(gal.name, screenX + 12, screenY + 4);
                });
            } 
            else if (activeLayer === VISUAL_LAYERS.GALACTIC) {
                activeNebulae.forEach(neb => {
                    const screenX = (neb.x - cameraX) * zoom + centerX; 
                    const screenY = (neb.y - cameraY) * zoom + centerY; 
                    const scaledRadius = neb.r * zoom;
                    let grad = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, scaledRadius);
                    grad.addColorStop(0, neb.color); grad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(screenX, screenY, scaledRadius, 0, Math.PI * 2); ctx.fill();
                });

                activeStarSystems.forEach(sys => {
                    const screenX = (sys.x - cameraX) * zoom + centerX; 
                    const screenY = (sys.y - cameraY) * zoom + centerY; 
                    const scaledRadius = sys.radius * zoom;
                    if (screenX + scaledRadius < -100 || screenX - scaledRadius > canvas.width + 100 || screenY + scaledRadius < -100 || screenY - scaledRadius > canvas.height + 100) return;

                    drawCustomCelestialObject(sys, screenX, screenY, scaledRadius);
                    ctx.font = "12px 'Courier New'"; ctx.fillStyle = '#ffffff';
                    ctx.fillText(sys.name, screenX + scaledRadius + 8, screenY + 4);
                });
            } 
            else if (activeLayer === VISUAL_LAYERS.SOLAR) {
                let sunX = (0 - cameraX) * zoom + centerX; let sunY = (0 - cameraY) * zoom + centerY;
                let activeSys = activeStarSystems[selectedStarSystemIndex];
                drawCustomCelestialObject(activeSys, sunX, sunY, activeSys.radius * zoom);

                activePlanets.forEach(p => {
                    let worldX = p.orbitRadius * Math.cos(p.angle);
                    let worldY = p.orbitRadius * Math.sin(p.angle);
                    const screenX = (worldX - cameraX) * zoom + centerX; 
                    const screenY = (worldY - cameraY) * zoom + centerY; 
                    const scaledRadius = p.radius * zoom;

                    ctx.beginPath(); ctx.arc(sunX, sunY, p.orbitRadius * zoom, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(0, 255, 170, 0.04)'; ctx.lineWidth = 1; ctx.stroke();

                    if (screenX + scaledRadius < -200 || screenX - scaledRadius > canvas.width + 200 || screenY + scaledRadius < -200 || screenY - scaledRadius > canvas.height + 200) return;

                    ctx.save(); ctx.translate(screenX, screenY);
                    renderPlanetTexture(ctx, scaledRadius, p); ctx.restore();

                    ctx.font = "12px 'Courier New'"; ctx.fillStyle = '#ffffff';
                    ctx.fillText(p.name, screenX + scaledRadius + 8, screenY + 4);
                });
            }
        }

        function updateHUD() {
            document.getElementById('coords').innerText = `Vector: X=${Math.round(cameraX)}, Y=${Math.round(cameraY)}`;
            document.getElementById('zoom').innerText = `Field Factor: ${zoom.toFixed(2)}x`;
        }

        function masterLoop() {
            cameraX += (targetCameraX - cameraX) * 0.08;
            cameraY += (targetCameraY - cameraY) * 0.08;
            zoom += (targetZoom - zoom) * 0.08;

            updatePhysics(); render(); updateHUD();
            requestAnimationFrame(masterLoop);
        }

        generateUniverseMap();
        masterLoop();
    </script>
</body>
</html>
